site_name: Stocklens
site_description: Stock following and screening system for US and Finnish markets
site_author: Stocklens contributors
docs_dir: docs/user

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - attr_list

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API Reference: api-reference.md
  - Architecture:
      - Overview: architecture.md
      - System Context: architecture/system-context.md
      - Containers: architecture/containers.md
      - Module Boundaries: architecture/modules.md
      - Data Model: architecture/data-model.md
      - Key Flows: architecture/sequences.md
  - Data Sources: data-sources.md
  - Operations: operations.md
